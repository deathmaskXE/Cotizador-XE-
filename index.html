<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XE cotizador de precios</title>
<link rel="manifest" href="manifest.json">
<style>
body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#0f0f0f;
    color:#fff;
    text-align:center;
    padding:15px;
    margin:0;
}
h2{margin-top:10px; margin-bottom:5px; color:#00d4ff;}
.sub{color:#aaa;margin-bottom:20px; font-size: 14px;}

.menu-controles {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 300px;
    margin: 30px auto;
}
.btn-control {
    background: #1c1c1c;
    color: #fff;
    border: 2px solid #333;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}
.btn-control:active {
    background: #0a2a33;
    border-color: #00d4ff;
}

.seccion-cotizador {
    display: none;
}
.btn-volver {
    background: #333;
    color: #fff;
    border: none;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 15px;
    font-size: 14px;
}

.section-title{
    margin:15px 0 15px;
    font-size:20px;
    font-weight:bold;
    color:#00d4ff;
}
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom: 20px;
}
.item{
    background:#1c1c1c;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    border:2px solid transparent;
    width: 40%;
    min-width:130px;
    box-sizing: border-box;
}
.item .price-time {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
}
.item.active{
    border:2px solid #00d4ff;
    background:#0a2a33;
}
.item.active .price-time {
    color: #00ff99;
}

.resumen-box {
    background: #161616;
    border-radius: 15px;
    padding: 15px;
    max-width: 450px;
    margin: 20px auto;
    border: 1px solid #222;
}
.total{
    font-size:2.2rem;
    margin:5px 0;
    color:#00ff99;
    font-weight: bold;
}
.tiempo-total {
    color: #ffcc00;
    font-size: 16px;
    margin-bottom: 15px;
}

.btn{
    padding:14px 20px;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
    font-size: 15px;
}
.wsp{background:#00c853;color:#fff; width: 80%; max-width: 300px;}
.clear{background:#ff3b30;color:#fff}
.hist{background:#444;color:#fff}

#history{
    max-width:450px;
    margin:20px auto;
    text-align:left;
    background:#1c1c1c;
    padding:15px;
    border-radius:12px;
    display:none;
}
</style>
</head>
<body>

<h2>XE cotizador de precios</h2>
<p class="sub">Sistema de reparación de controles</p>

<!-- MENÚ INICIAL DE SELECCIÓN -->
<div id="menuControles" class="menu-controles">
    <button class="btn-control" onclick="mostrarCotizador('xbox')">🎮 Xbox Series</button>
    <button class="btn-control" onclick="mostrarCotizador('dualsense')">🎮 DualSense PS5</button>
    <button class="btn-control" onclick="mostrarCotizador('joycon')">🎮 Joycon Switch</button>
    <button class="btn-control" onclick="mostrarCotizador('elite')">🎮 Elite Series 2</button>
    <button class="btn-control" onclick="mostrarCotizador('edge')">🎮 DualSense Edge</button>
</div>

<!-- SECCIÓN DEL COTIZADOR (OCULTA AL INICIO) -->
<div id="seccionCotizador" class="seccion-cotizador">
    <button class="btn-volver" onclick="volverAlMenu()">← Volver al Menú</button>
    
    <div id="tituloControl" class="section-title">Control</div>

    <!-- Bloques de piezas (se activan por JS) -->
    <div id="gridPiezas" class="grid"></div>

    <div class="resumen-box">
        <p id="list" style="color: #ccc; margin: 5px 0;">Ninguna pieza seleccionada</p>
        <div class="total">$<span id="total">0</span> MXN</div>
        <div class="tiempo-total">⏱️ Tiempo estimado: <span id="tiempo">0</span> min</div>
        
        <button class="btn wsp" id="send">Enviar a WhatsApp</button> <br>
        <button class="btn clear" id="clear">Limpiar</button>
        <button class="btn hist" id="toggleHistory">Historial</button>
    </div>
</div>

<div id="history"></div>

<script>
const phone = "527471731852";
const historyBox = document.getElementById("history");

// Base de datos de piezas por control
const datosControles = {
    xbox: {
        titulo: "🎮 Xbox Series",
        piezas: [
            {n: "Joystick", p: 300, t: 10},
            {n: "Tmr", p: 450, t: 10},
            {n: "Bumper", p: 250, t: 5},
            {n: "Microswitch LB y RB", p: 250, t: 10},
            {n: "Gatillo", p: 300, t: 15},
            {n: "D-pad", p: 250, t: 10},
            {n: "Puerto tipo C", p: 300, t: 30},
            {n: "Jack de audífonos", p: 200, t: 5},
            {n: "Capuchón par", p: 60, t: 5},
            {n: "Color de led", p: 50, t: 10},
            {n: "Goma conductiva A,B,X,Y", p: 250, t: 10}
        ]
    },
    dualsense: {
        titulo: "🎮 DualSense PS5",
        piezas: [
            {n: "Joystick", p: 300, t: 10},
            {n: "Tmr", p: 450, t: 10},
            {n: "Puerto tipo c", p: 300, t: 30},
            {n: "Jack de audífonos", p: 350, t: 30},
            {n: "Capuchón par", p: 60, t: 5},
            {n: "Membrana de botones", p: 280, t: 30},
            {n: "Gomas conductivas", p: 250, t: 20},
            {n: "Batería", p: 550, t: 10},
            {n: "Motor áptico", p: 400, t: 10},
            {n: "Motor adaptativo", p: 500, t: 40}
        ]
    },
    joycon: {
        titulo: "🎮 Joycon Switch",
        piezas: [
            {n: "Joystick", p: 300, t: 10},
            {n: "Tmr", p: 450, t: 10},
            {n: "Flex sincronizar", p: 280, t: 10},
            {n: "Batería", p: 400, t: 5},
            {n: "Botón L o R", p: 300, t: 30},
            {n: "Riel", p: 350, t: 20}
        ]
    },
    elite: {
        titulo: "🎮 Elite Series 2",
        piezas: [
            {n: "Joystick", p: 450, t: 10},
            {n: "Tmr", p: 550, t: 10},
            {n: "Bumper", p: 300, t: 5},
            {n: "Microswitch LB y RB", p: 350, t: 10},
            {n: "Gatillo", p: 500, t: 15},
            {n: "D-pad", p: 300, t: 10},
            {n: "Puerto tipo C", p: 500, t: 30},
            {n: "Jack de audífonos", p: 200, t: 5},
            {n: "Thumbstick metálico kit", p: 600, t: 5},
            {n: "Goma conductiva A,B,X,Y", p: 350, t: 10}
        ]
    },
    edge: {
        titulo: "🎮 DualSense Edge",
        piezas: [
            {n: "Joystick", p: 450, t: 10},
            {n: "Tmr", p: 550, t: 10},
            {n: "Puerto tipo c", p: 500, t: 30},
            {n: "Jack de audífonos", p: 450, t: 30},
            {n: "Capuchón par", p: 200, t: 15},
            {n: "Membrana de botones", p: 380, t: 30},
            {n: "Gomas conductivas", p: 300, t: 20},
            {n: "Batería", p: 650, t: 10},
            {n: "Motor áptico", p: 500, t: 10},
            {n: "Motor adaptativo", p: 600, t: 40}
        ]
    }
};

let controlActivo = "";

function mostrarCotizador(key) {
    controlActivo = datosControles[key].titulo;
    document.getElementById("menuControles").style.display = "none";
    document.getElementById("seccionCotizador").style.display = "block";
    document.getElementById("tituloControl").textContent = controlActivo;
    
    const grid = document.getElementById("gridPiezas");
    grid.innerHTML = "";
    
    datosControles[key].piezas.forEach(p => {
        let item = document.createElement("div");
        item.className = "item";
        item.dataset.name = p.n;
        item.dataset.price = p.p;
        item.dataset.time = p.t;
        item.innerHTML = `${p.n} <div class="price-time">$${p.p} • ${p.t} min</div>`;
        
        item.onclick = () => {
            item.classList.toggle("active");
            update();
        };
        grid.appendChild(item);
    });
    update();
}

function volverAlMenu() {
    document.getElementById("seccionCotizador").style.display = "none";
    document.getElementById("menuControles").style.display = "flex";
    historyBox.style.display = "none";
}

function getData(){
    let subtotal = 0;
    let time = 0;
    let list = [];
    const items = document.querySelectorAll(".item");

    items.forEach(i=>{
        if(i.classList.contains("active")){
            subtotal += Number(i.dataset.price);
            time += Number(i.dataset.time);
            list.push(i.dataset.name);
        }
    });
    return {subtotal, time, list};
}

function saveHistory(data){
    let history = JSON.parse(localStorage.getItem("xe_history")||"[]");
    history.unshift({
        date: new Date().toLocaleString(),
        control: controlActivo,
        items: data.list,
        total: data.subtotal
    });
    localStorage.setItem("xe_history", JSON.stringify(history));
}

function renderHistory(){
    let history = JSON.parse(localStorage.getItem("xe_history")||"[]");
    historyBox.innerHTML = "<h3>Historial de Cotizaciones</h3>";
    if(history.length === 0) {
        historyBox.innerHTML += "<p style='color:#aaa;'>No hay cotizaciones grabadas.</p>";
    }
    history.forEach(h=>{
        historyBox.innerHTML += `
        <div style="border-bottom:1px solid #333;padding:10px 0">
        <b>🗓️ ${h.date}</b><br>
        <span style="color:#00d4ff">${h.control}</span><br>
        <span style="font-size:14px; color:#ccc;">${h.items.join(", ")}</span><br>
        💰 <b>$${h.total} MXN</b>
        </div>`;
    });
}

function update(){
    let data = getData();
    document.getElementById("total").textContent = data.subtotal;
    document.getElementById("tiempo").textContent = data.time;
    document.getElementById("list").textContent = data.list.length ? data.list.join(", ") : "Ninguna pieza seleccionada";

    document.getElementById("send").onclick = () => {
        if(!data.list.length) return;
        saveHistory(data);
        
        let msg = `🛠️ *XE cotizador de precios*\n\n`;
        msg += `🎮 *Control:* ${controlActivo}\n`;
        msg += `📦 *Reparaciones:* \n${data.list.map(p=>"• "+p).join("\n")}\n\n`;
        msg += `⏱️ *Tiempo estimado:* ${data.time} min\n`;
        msg += `💰 *Total neto:* $${data.subtotal} MXN`;

        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
    };
}

document.getElementById("clear").onclick = () => {
    document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
    update();
};

document.getElementById("toggleHistory").onclick = () => {
    historyBox.style.display = historyBox.style.display === "block" ? "none" : "block";
    renderHistory();
};
</script>

<script>
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
