<style>
body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#0b0712;
    color:#fff;
    text-align:center;
    padding:15px;
    margin:0;
}

/* LOGO XE SERVICIO ELECTRÓNICO */
.brand-container {
    margin: 25px auto 15px;
    padding: 10px;
    border: 2px dashed #9b51e0;
    border-radius: 12px;
    max-width: 300px;
    background: rgba(155, 81, 224, 0.05);
}
.logo-main {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #00d4ff, #9b51e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
}
.logo-sub {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #00d4ff;
    margin: 5px 0 0 0;
    font-weight: bold;
}
.sub-title{color:#aaa; margin-bottom:25px; font-size: 13px;}

/* MENÚS PRINCIPALES (CYAN Y MORADO METÁLICO) */
.menu-principal {
    display: flex !important;
    flex-direction: column;
    gap: 16px;
    max-width: 310px;
    margin: 30px auto;
}
.menu-controles {
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 310px;
    margin: 25px auto;
}
.btn-menu-raiz {
    background: linear-gradient(135deg, #161026, #23133d);
    color: #fff;
    border: 2px solid #9b51e0;
    padding: 20px;
    border-radius: 16px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(155, 81, 224, 0.3);
    transition: 0.2s;
}
.btn-menu-raiz:active {
    background: #9b51e0;
    box-shadow: 0 0 20px #00d4ff;
}
.btn-control {
    background: #111424;
    color: #fff;
    border: 2px solid #00d4ff;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}
.btn-control:active {
    background: #0d2330;
    border-color: #9b51e0;
}

/* SECCIONES OCULTAS */
.seccion-flujo, .seccion-cotizador {
    display: none;
}
.btn-volver {
    background: #25183a;
    color: #00d4ff;
    border: 1px solid #00d4ff;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: bold;
}

.section-title{
    margin: 15px 0;
    font-size: 22px;
    font-weight: bold;
    color: #00d4ff;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
}
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom: 20px;
}
.item{
    background: linear-gradient(135deg, #121620, #191224);
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    border:2px solid #252233;
    width: 44%;
    min-width:140px;
    box-sizing: border-box;
}
.item .price-time {
    font-size: 11px;
    color: #aaa;
    margin-top: 4px;
}
.item.active{
    border-color: #00d4ff;
    background: #0d2330;
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
}
.item.active .price-time {
    color: #00ff99;
}

/* RESUMEN BOX */
.resumen-box {
    background: #0f0b1a;
    border-radius: 16px;
    padding: 15px;
    max-width: 450px;
    margin: 20px auto;
    border: 1px solid #2b1a4a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.total{

    font-weight: bold;
}
.descuento-box {
    color: #ff3b30;
    font-size: 14px;
    font-weight: bold;
    margin: -5px 0 10px 0;
    display: none;
}
.tiempo-total {
    color: #ffcc00;
    font-size: 15px;
    margin-bottom: 15px;
}

.btn{
    padding:14px 20px;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
    font-size: 15px;

.wsp{
    background: linear-gradient(135deg, #00c853, #009624);
    color: #fff; 
    width: 85%;

}
.clear{background:#42111c; color:#ff3b30; border: 1px solid #ff3b30;}
.hist{background:#2a233d; color:#b59eff; border: 1px solid #564780;}

#history{

    text-align:left;
    background:#110d1f;
    padding:15px;
    border-radius:12px;
    border: 1px solid #251c3d;

function irAFlujo(flujo) {
    tipoFlujoActivo = flujo;
    document.getElementById("menuRaiz").style.display = "none";
    if(flujo === 'controles') {
        document.getElementById("flujoControles").style.display = "block";
    } else {
        document.getElementById("flujoConsolas").style.display = "block";
    }
}

function volverAlMenuRaiz() {
    document.getElementById("flujoControles").style.display = "none";
    document.getElementById("flujoConsolas").style.display = "none";
    document.getElementById("menuRaiz").style.display = "flex";
    historyBox.style.display = "none";
}

function mostrarCotizador(flujo, modelo) {
    tipoFlujoActivo = flujo;
    modeloActivo = BD_SERVICIOS[flujo][modelo].titulo;
    
    document.getElementById("flujoControles").style.display = "none";
    document.getElementById("flujoConsolas").style.display = "none";
    document.getElementById("seccionCotizador").style.display = "block";
    document.getElementById("tituloModelo").textContent = modeloActivo;
    
    document.getElementById("btnAtrasFlujo").onclick = () => {
        document.getElementById("seccionCotizador").style.display = "none";
        irAFlujo(flujo);
    };

    const grid = document.getElementById("gridPiezas");
    grid.innerHTML = "";
    
    BD_SERVICIOS[flujo][modelo].piezas.forEach(p => {
        let item = document.createElement("div");
        item.className = "item";
        item.dataset.name = p.n;
        item.dataset.price = p.p;
        item.dataset.time = p.t;
        item.dataset.minutos = p.tm;
        item.innerHTML = `${p.n} <div class="price-time">$${p.p} • ${p.t}</div>`;
        
        item.onclick = () => {
            item.classList.toggle("active");
            update();
        };
        grid.appendChild(item);
    });
    update();
}

function minAHorasTexto(minutosTotales) {
    if (minutosTotales < 60) return `${minutosTotales} min`;
    let horas = Math.floor(minutosTotales / 60);
    let mins = minutosTotales % 60;
    return mins > 0 ? `${horas} hr y ${mins} min` : `${horas} hr`;
}

function update(){
    let subtotal = 0;
    let minutosTotales = 0;
    let list = [];
    const items = document.querySelectorAll(".item");

    items.forEach(i=>{
        if(i.classList.contains("active")){
            subtotal += Number(i.dataset.price);
            minutosTotales += Number(i.dataset.minutos);
            list.push(i.dataset.name);
        }
    });

    let descuento = 0;
    let totalNeto = subtotal;

    if(tipoFlujoActivo === "controles" && subtotal >= 600) {
        descuento = Math.round(subtotal * 0.15);
        totalNeto = subtotal - descuento;
        
        document.getElementById("txtSubtotal").style.display = "block";
        document.getElementById("valSubtotal").textContent = subtotal;
        document.getElementById("descuentoBox").style.display = "block";
        document.getElementById("valAhorro").textContent = descuento;
    } else {
        document.getElementById("txtSubtotal").style.display = "none";
        document.getElementById("descuentoBox").style.display = "none";
    }

    document.getElementById("total").textContent = totalNeto;
    document.getElementById("tiempo").textContent = minAHorasTexto(minutosTotales);
    document.getElementById("list").textContent = list.length ? list.join(", ") : "Ningún servicio seleccionado";

    document.getElementById("send").onclick = () => {
        if(!list.length) return;
        saveHistory(subtotal, totalNeto, descuento, list);
        
        let msg = `🛠️ *XE SERVICIO ELECT
