<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XE Servicio Electrónico</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
position:relative;
padding:4px;
border-radius:20px;
}

.container::before{
content:"";
position:absolute;
inset:0;
border-radius:20px;
padding:2px;
background:linear-gradient(90deg,#00ffff,#8a2be2,#00ffff,#8a2be2);
background-size:300% 300%;
animation:borderMove 4s linear infinite;
mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
mask-composite:exclude;
-webkit-mask-composite:xor;
pointer-events:none;
}

@keyframes borderMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.xe-icon{
width:120px;
height:120px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:42px;
font-weight:bold;
color:#00ffff;
background:rgba(0,0,0,0.4);
border:2px solid #00ffff;
text-shadow:0 0 10px #00ffff,0 0 25px #8a2be2;
box-shadow:0 0 20px #00ffff,0 0 40px #8a2be2;
animation:xePulse 2s infinite;
}

@keyframes xePulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

.neon{
text-align:center;
font-size:18px;
letter-spacing:6px;
margin-top:10px;
animation:neonGlow 1.5s infinite alternate;
}

@keyframes neonGlow{
from{text-shadow:0 0 5px #00ffff,0 0 10px #8a2be2;}
to{text-shadow:0 0 20px #00ffff,0 0 35px #8a2be2;}
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
margin:15px 0;
border-radius:15px;
}

select,input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.wa{background:linear-gradient(90deg,#00ffff,#8a2be2);color:white;}
.pay{background:linear-gradient(90deg,#8a2be2,#00ffff);color:white;}
.clear{background:#ff004c;color:white;}
.link{background:#111;border:1px solid #00ffff;color:#00ffff;}

.result{
background:#0d0d0d;
padding:10px;
border-radius:10px;
}

.paybox{
background:#0d0d0d;
padding:15px;
border-radius:15px;
border:1px solid #00ffff;
}
</style>
</head>

<body>

<div class="container">

<div class="xe-icon">XE</div>
<div class="neon">SERVICIO ELECTRÓNICO</div>

<div class="card">

<label>Consola</label>
<select id="consola" onchange="loadServices()"></select>

<label>Servicio 1</label>
<select id="s1" onchange="calc()"></select>

<label>Servicio 2</label>
<select id="s2" onchange="calc()"></select>

<label>Cliente</label>
<input id="cliente">

<label>Describe tu falla</label>
<textarea id="obs"></textarea>

<div class="result">
💰 Subtotal: <span id="sub">$0</span><br>
💥 Descuento: <span id="disc">$0</span><br>
💰 Total: <span id="total">$0</span>
</div>

<button class="wa" onclick="sendWA()">WhatsApp</button>
<button class="pay" onclick="agendar()">Anticipo y agendar</button>
<button class="clear" onclick="clearAll()">🧹 Limpiar cotización</button>

<button class="link" onclick="window.open('https://deathmaskxe.github.io/CotizadorXE/')">
Cotizador Controles
</button>

<button class="link" onclick="window.open('https://deathmaskxe.github.io/Tester-de-funcionalidad-controles/')">
Tester Controles
</button>

</div>

<div class="paybox">
<h3>Pagos</h3>
<p>Anticipo mínimo: $200 MXN</p>
<p>Requiere envío de comprobante para agendar</p>
<p>Banorte: 4189 1400 1021 7767</p>
<p>MercadoPago: 722969020089368829</p>
</div>

</div>

<script>

/* ✅ TODAS LAS CONSOLAS COMPLETAS RESTAURADAS */
const data={

"Xbox One":[
["Revisión / Diagnóstico",200],
["Mantenimiento",600],
["Cambio de ventilador",400],
["Cambio de módulo inalámbrico",400],
["Cambio de panel frontal",600],
["Reparación corto en mosfet",900],
["Reparación corto en Realtek",900],
["Reparación corto en filtros o ESD",900],
["Reparación HDMI",900],
["Reparación IC Power",1000]
],

"Xbox One S":[
["Revisión / Diagnóstico",200],
["Mantenimiento",600],
["Cambio de ventilador",500],
["Cambio de módulo inalámbrico",500],
["Cambio de panel frontal",600],
["Reparación corto en mosfet",1000],
["Reparación corto en Realtek",1000],
["Reparación corto en filtros",600],
["Reparación ESD",1200],
["Reparación HDMI",1000],
["Reparación IC Power",1200],
["Reparación retimer",1000],
["Cambio de carcasa",800]
],

"Xbox Series S":[
["Revisión / Diagnóstico",200],
["Mantenimiento",1200],
["Cambio de HDMI",1300],
["Cambio módulo Bluetooth",800],
["Cambio módulo wifi",900],
["Reparación retimer",1500],
["Reparación ESD",1800],
["Reparación SSD",2300],
["Reparación ethernet",1200],
["RAM/APU",2000],
["MOSFET",1500],
["Fuente",900],
["Cambio fuente",1200],

],

"Xbox Series X":[

["Mantenimiento",1500],
["Cambio HDMI",1500],
["Bluetooth",1000],
["WiFi",1000],
["Retimer",1800],
["ESD",2200],
["SSD",5000],
["Ethernet",1500],
["RAM/APU",2600],
["MOSFET",1800],
["Fuente",1200],
["Cambio fuente",1500],
["Ventilador",1400]
],

"PS4":[
["Revisión / Diagnóstico",200],
["Mantenimiento",700],
["Disco 1TB",2000],
["Disco 500GB",1600],
["HDMI",1000],
["IC Encoder",1100],
["Lectora",1000]
],

"PS4 Pro":[
["Revisión / Diagnóstico",200],
["Mantenimiento",900],
["Disco 1TB",2000],

["HDMI",1000],

],

"PS5":[

],

["Mantenimiento",600]
]

};

let c=document.getElementById("consola");
let s1=document.getElementById("s1");
let s2=document.getElementById("s2");

Object.keys(data).forEach(x=>{
let o=document.createElement("option");
o.value=x;
o.textContent=x;
c.appendChild(o);
});

function loadServices(){

s1.innerHTML="";
s2.innerHTML="";

let none=document.createElement("option");
none.value=0;
none.textContent="Ningún servicio";

s1.appendChild(none.cloneNode(true));
s2.appendChild(none.cloneNode(true));

data[c.value].forEach(x=>{
let o1=document.createElement("option");
o1.value=x[1];
o1.textContent=x[0];
s1.appendChild(o1);

let o2=document.createElement("option");
o2.value=x[1];
o2.textContent=x[0];
s2.appendChild(o2);
});

calc();
}

function calc(){
let v1=parseFloat(s1.value||0);
let v2=parseFloat(s2.value||0);

let sub=v1+v2;
let disc=(v1>0 && v2>0)?sub*0.10:0;

document.getElementById("sub").innerText="$"+sub;
document.getElementById("disc").innerText="$"+disc.toFixed(2);
document.getElementById("total").innerText="$"+(sub-disc);
}

/* WHATSAPP CON SERVICIOS */
function sendWA(){

let serv1=s1.options[s1.selectedIndex].text;
let serv2=s2.options[s2.selectedIndex].text;

let msg=`🛠 XE SERVICIO ELECTRÓNICO

Cliente: ${cliente.value}
Consola: ${c.value}

Servicio 1: ${serv1}
Servicio 2: ${serv2}

Total: ${document.getElementById("total").innerText}

Falla: ${obs.value}`;

window.open("https://wa.me/527471731852?text="+encodeURIComponent(msg));
}

function agendar(){

let msg=`💳 XE SERVICIO ELECTRÓNICO

Anticipo mínimo: $200 MXN
Requiere comprobante para agendar

Cliente: ${cliente.value}
Consola: ${c.value}
Total: ${document.getElementById("total").innerText}`;

window.open("https://wa.me/527471731852?text="+encodeURIComponent(msg));
}

function clearAll(){
s1.selectedIndex=0;
s2.selectedIndex=0;
cliente.value="";
obs.value="";
calc();
}

</script>

</body>
</html>
